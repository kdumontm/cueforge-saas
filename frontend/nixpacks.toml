[variables]
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
CI = "true"
NEXT_TELEMETRY_DISABLED = "1"
# Empêche Railway de passer --production à npm ci (cause EUSAGE sur Node 22 / npm 10)
NPM_CONFIG_PRODUCTION = "false"
# NODE_OPTIONS est aussi injecté directement dans le script build de package.json pour fiabilité
NODE_OPTIONS = "--max-old-space-size=4096"

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
# standalone output: copier les fichiers statiques puis démarrer le serveur Node
cmd = "cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public && node .next/standalone/server.js"
