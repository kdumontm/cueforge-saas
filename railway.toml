[build]
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "cd /app && gunicorn app.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --max-requests 200 --max-requests-jitter 50"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
